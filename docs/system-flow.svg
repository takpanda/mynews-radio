<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">mynews-radio システムフロー図</title>
  <desc id="desc">フロントエンド、バックエンドAPI、バッチ、外部サービス、ストレージのデータフロー</desc>
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 12; ry: 12; }
      .group { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 16; ry: 16; }
      .txt { fill: #0f172a; font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { fill: #0f172a; font: 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 600; }
      .arrow { stroke: #0f172a; stroke-width: 2.4; fill: none; marker-end: url(#m); }
      .dashed { stroke-dasharray: 8 6; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a" />
    </marker>
  </defs>

  <text x="28" y="38" class="title">mynews-radio システムフロー</text>

  <rect x="20" y="60" width="300" height="240" class="group" />
  <text x="36" y="88" class="txt">Frontend (Next.js)</text>
  <rect x="42" y="110" width="256" height="70" class="box" />
  <text x="56" y="138" class="txt">UI pages</text>
  <text x="56" y="160" class="small">/ , /episodes/[id]</text>
  <rect x="42" y="196" width="256" height="84" class="box" />
  <text x="56" y="224" class="txt">API Proxy</text>
  <text x="56" y="246" class="small">/api/generate (SSE relay)</text>
  <text x="56" y="266" class="small">API_BASE → backend</text>

  <rect x="360" y="60" width="430" height="670" class="group" />
  <text x="376" y="88" class="txt">Backend (FastAPI)</text>

  <rect x="386" y="110" width="378" height="90" class="box" />
  <text x="402" y="138" class="txt">REST / SSE API</text>
  <text x="402" y="160" class="small">/health, /episodes, /articles, /audio, /generate</text>
  <text x="402" y="180" class="small">app.main + app.api.*</text>

  <rect x="386" y="220" width="378" height="288" class="box" />
  <text x="402" y="248" class="txt">Batch pipeline</text>
  <text x="402" y="270" class="small">1) import_articles</text>
  <text x="402" y="292" class="small">2) summarize_articles</text>
  <text x="402" y="314" class="small">3) generate_script (+ review_script optional)</text>
  <text x="402" y="336" class="small">4) synthesize_voicevox / AivisSpeech</text>
  <text x="402" y="358" class="small">5) build_episode (ffmpeg)</text>
  <text x="402" y="380" class="small">orchestrate.py / api.generate._stream_generate</text>

  <rect x="386" y="526" width="180" height="178" class="box" />
  <text x="402" y="554" class="txt">Service層</text>
  <text x="402" y="576" class="small">ArticleService</text>
  <text x="402" y="598" class="small">EpisodeService</text>
  <text x="402" y="620" class="small">OllamaClient</text>
  <text x="402" y="642" class="small">VoicevoxClient</text>

  <rect x="584" y="526" width="180" height="178" class="box" />
  <text x="600" y="554" class="txt">DB層</text>
  <text x="600" y="576" class="small">SQLite</text>
  <text x="600" y="598" class="small">articles</text>
  <text x="600" y="620" class="small">episodes</text>
  <text x="600" y="642" class="small">episode_items</text>

  <rect x="830" y="60" width="350" height="300" class="group" />
  <text x="846" y="88" class="txt">External services</text>
  <rect x="852" y="110" width="306" height="68" class="box" />
  <text x="868" y="138" class="txt">News source</text>
  <text x="868" y="160" class="small">Hatena / Yahoo RSS</text>
  <rect x="852" y="192" width="306" height="68" class="box" />
  <text x="868" y="220" class="txt">Ollama</text>
  <text x="868" y="242" class="small">summary + script generation</text>
  <rect x="852" y="274" width="306" height="68" class="box" />
  <text x="868" y="302" class="txt">VOICEVOX / AivisSpeech</text>
  <text x="868" y="324" class="small">text-to-speech</text>

  <rect x="830" y="390" width="350" height="340" class="group" />
  <text x="846" y="418" class="txt">Storage (data/)</text>
  <rect x="852" y="438" width="306" height="84" class="box" />
  <text x="868" y="466" class="txt">episodes/&lt;id&gt;</text>
  <text x="868" y="488" class="small">script.json, lines/*.wav, episode.mp3, metadata.json</text>
  <rect x="852" y="538" width="306" height="74" class="box" />
  <text x="868" y="566" class="txt">jingles/</text>
  <text x="868" y="588" class="small">opening.mp3, ending.mp3, transition.mp3</text>
  <rect x="852" y="626" width="306" height="84" class="box" />
  <text x="868" y="654" class="txt">logs/</text>
  <text x="868" y="676" class="small">batch execution logs</text>

  <path d="M300 150 L386 150" class="arrow" />
  <text x="312" y="138" class="small">HTTP / SSE</text>

  <path d="M300 238 L386 238" class="arrow" />
  <text x="315" y="226" class="small">POST /generate</text>

  <path d="M764 254 L852 144" class="arrow" />
  <path d="M764 270 L852 226" class="arrow" />
  <path d="M764 286 L852 308" class="arrow" />

  <path d="M620 508 L620 526" class="arrow" />
  <path d="M764 330 L852 470" class="arrow" />
  <path d="M764 348 L852 566" class="arrow dashed" />

  <path d="M566 614 L584 614" class="arrow" />
  <path d="M566 642 L852 642" class="arrow" />
</svg>
