<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">mynews-radio ER図</title>
  <desc id="desc">articles, episodes, episode_items のテーブル定義とリレーション</desc>
  <defs>
    <style>
      .tbl { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 12; ry: 12; }
      .hdr { fill: #e2e8f0; }
      .txt { fill: #0f172a; font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .name { fill: #0f172a; font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 600; }
      .note { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .line { stroke: #0f172a; stroke-width: 2.4; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a" />
    </marker>
  </defs>

  <text x="30" y="38" class="name">mynews-radio ER Diagram (SQLite)</text>

  <g transform="translate(30,80)">
    <rect class="tbl" x="0" y="0" width="360" height="430"/>
    <rect class="hdr" x="1" y="1" width="358" height="48"/>
    <text x="16" y="32" class="name">articles</text>

    <text x="16" y="76" class="txt">PK  id INTEGER AUTOINCREMENT</text>
    <text x="16" y="102" class="txt">title TEXT NOT NULL</text>
    <text x="16" y="128" class="txt">source TEXT</text>
    <text x="16" y="154" class="txt">url TEXT UNIQUE</text>
    <text x="16" y="180" class="txt">text TEXT</text>
    <text x="16" y="206" class="txt">summary TEXT</text>
    <text x="16" y="232" class="txt">category TEXT</text>
    <text x="16" y="258" class="txt">importance_score INTEGER</text>
    <text x="16" y="284" class="txt">difficulty INTEGER</text>
    <text x="16" y="310" class="txt">status TEXT DEFAULT 'new'</text>
    <text x="16" y="336" class="txt">published_at TEXT</text>
    <text x="16" y="362" class="txt">created_at TEXT DEFAULT CURRENT_TIMESTAMP</text>

    <text x="16" y="402" class="note">Index: idx_articles_status, idx_articles_importance_score</text>
  </g>

  <g transform="translate(430,80)">
    <rect class="tbl" x="0" y="0" width="340" height="290"/>
    <rect class="hdr" x="1" y="1" width="338" height="48"/>
    <text x="16" y="32" class="name">episodes</text>

    <text x="16" y="76" class="txt">PK  id INTEGER AUTOINCREMENT</text>
    <text x="16" y="102" class="txt">episode_date TEXT NOT NULL</text>
    <text x="16" y="128" class="txt">script_text TEXT</text>
    <text x="16" y="154" class="txt">audio_path TEXT</text>
    <text x="16" y="180" class="txt">status TEXT DEFAULT 'pending'</text>
    <text x="16" y="206" class="txt">created_at TEXT DEFAULT CURRENT_TIMESTAMP</text>
    <text x="16" y="232" class="txt">updated_at TEXT DEFAULT CURRENT_TIMESTAMP</text>

    <text x="16" y="266" class="note">Index: idx_episodes_date</text>
  </g>

  <g transform="translate(430,400)">
    <rect class="tbl" x="0" y="0" width="460" height="250"/>
    <rect class="hdr" x="1" y="1" width="458" height="48"/>
    <text x="16" y="32" class="name">episode_items</text>

    <text x="16" y="76" class="txt">PK  id INTEGER AUTOINCREMENT</text>
    <text x="16" y="102" class="txt">FK  episode_id INTEGER NOT NULL → episodes.id (ON DELETE CASCADE)</text>
    <text x="16" y="128" class="txt">FK  article_id INTEGER → articles.id (ON DELETE SET NULL)</text>
    <text x="16" y="154" class="txt">item_order INTEGER NOT NULL</text>
    <text x="16" y="180" class="txt">segment_text TEXT</text>
    <text x="16" y="206" class="txt">created_at TEXT DEFAULT CURRENT_TIMESTAMP</text>

    <text x="16" y="236" class="note">Index: idx_episode_items_episode_id, idx_episode_items_order</text>
  </g>

  <path d="M770 220 L980 220 L980 510 L890 510" class="line"/>
  <text x="988" y="262" class="note">1 : N</text>
  <text x="934" y="500" class="note">episodes.id → episode_items.episode_id</text>

  <path d="M390 300 L1010 300 L1010 536 L890 536" class="line"/>
  <text x="1018" y="332" class="note">1 : N (nullable FK)</text>
  <text x="905" y="562" class="note">articles.id → episode_items.article_id</text>
</svg>
