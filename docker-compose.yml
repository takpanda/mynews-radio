services:
  api:
    build:
      context: ./backend
    container_name: mynews-radio-api
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 6 * * *}
    volumes:
      - ./backend:/app
      - ./data:/app/data
    ports:
      - "8010:8010"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8010 --reload

  web:
    dns:
      - 127.0.0.11
    build:
      context: ./frontend
    container_name: mynews-radio-web
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3010:3010"
    command: npm run dev
    depends_on:
      - api
